services:
    db:
      image: postgres:15
      container_name: v0_postgres
      restart: always
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: v0
      ports:
        - "7899:5432"
      volumes:
         - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
